[pytest]
addopts = -n 4 --dist=loadfile -m "not slow"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
asyncio_default_test_loop_scope = module
testpaths = tests
filterwarnings =
    ignore:IPython dir .* is not a writable location.*:UserWarning
markers =
    slow: slow tests (excluded by default)
    compat: vanilla-client transport tests (must run before ConKernelClient tests in their worker; tests/compat sorts first)
